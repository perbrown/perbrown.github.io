
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Area of an Obtuse Triangle (Grade 6)</title>
  <style>
    :root{
      --bg:#071027;
      --panel:#0c1a3a;
      --ink:#eef3ff;
      --muted:#b9c7ff;

      --triA:#39d98a;
      --triB:#3fb9ff;

      --base:#6fe8ff;
      --height:#ffd166;

      --outline:rgba(255,255,255,.35);
      --grid:rgba(255,255,255,.06);
      --shadow:rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1100px 700px at 20% 10%, #1c2d68 0%, var(--bg) 55%, #040714 100%);
      color:var(--ink);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .wrap{
      width:min(1040px, 100%);
      display:grid;
      grid-template-columns: 1.5fr 1fr;
      gap:14px;
    }

    .stage, .side{
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      overflow:hidden;
      box-shadow: 0 18px 55px var(--shadow);
    }

    .stage{
      height:600px;
      position:relative;
    }

    .topbar{
      position:absolute;
      left:0; right:0; top:0;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      background: linear-gradient(180deg, rgba(0,0,0,.6), rgba(0,0,0,0));
      pointer-events:none;
      z-index:5;
    }
    .topbar .title{
      font-weight:800;
      letter-spacing:.2px;
    }
    .topbar .subtitle{
      margin-top:4px;
      font-size:12.5px;
      color:var(--muted);
      font-weight:600;
      max-width: 420px;
      line-height:1.25;
    }

    canvas{ width:100%; height:100%; display:block; }

    .side{
      height:600px;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .card{
      background: rgba(0,0,0,.20);
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      padding:12px;
    }

    .stepLine{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }
    .badge{
      font-size:12px;
      color:rgba(238,243,255,.92);
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      padding:4px 9px;
      border-radius:999px;
      white-space:nowrap;
    }
    h2{
      font-size:16px;
      margin:0;
    }
    p{
      margin:0;
      color:rgba(238,243,255,.90);
      line-height:1.35;
      font-size:13.8px;
    }

    .formula{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      padding:10px;
      color:rgba(238,243,255,.95);
      line-height:1.35;
      font-size:13px;
      white-space:pre-wrap;
    }

    .legend{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:7px 10px;
      align-items:center;
      font-size:13px;
      color:rgba(238,243,255,.90);
    }
    .sw{ width:14px; height:14px; border-radius:4px; border:1px solid rgba(255,255,255,.25); }

    .controls{
      margin-top:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-top:10px;
      border-top:1px solid rgba(255,255,255,.12);
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }
    .btns{ display:flex; gap:10px; flex-wrap:wrap; }

    button{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.10);
      color:var(--ink);
      font-weight:800;
      cursor:pointer;
    }
    button:hover{ background: rgba(255,255,255,.14); }
    button:disabled{ opacity:.45; cursor:not-allowed; }

    label{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:12.5px;
      font-weight:650;
      user-select:none;
    }
    input[type="range"]{ width:190px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stage">
      <div class="topbar">
        <div>
          <div class="title">Area of an Obtuse Triangle</div>
          <div class="subtitle">We will use TWO copies of the same triangle to make a parallelogram.</div>
        </div>
        <div class="subtitle" id="status"></div>
      </div>
      <canvas id="cv"></canvas>
    </div>

    <div class="side">
      <div class="card">
        <div class="stepLine">
          <h2 id="stepTitle">Step 1: Base and height</h2>
          <div class="badge" id="stepBadge">1 / 4</div>
        </div>
        <p id="stepText"></p>
      </div>

      <div class="card">
        <div class="legend">
          <div class="sw" style="background:var(--triA)"></div><div>Triangle (copy 1)</div>
          <div class="sw" style="background:var(--triB)"></div><div>Triangle (copy 2)</div>
          <div class="sw" style="background:var(--base)"></div><div>Base (b)</div>
          <div class="sw" style="background:var(--height)"></div><div>Height (h) — perpendicular</div>
        </div>
      </div>

      <div class="formula" id="formula">
Parallelogram area = b × h
Two equal triangles make a parallelogram
So triangle area = (b × h) ÷ 2
      </div>

      <div class="controls">
        <div class="row">
          <div class="btns">
            <button id="back">Back</button>
            <button id="next">Next</button>
            <button id="replay">Replay</button>
          </div>
          <div class="btns">
            <button id="pause">Pause</button>
            <button id="play">Play</button>
          </div>
        </div>

        <label>
          Speed
          <input id="speed" type="range" min="0.6" max="2.0" value="1.0" step="0.1"/>
          <span id="speedVal">1.0×</span>
        </label>
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d');

  const statusEl = document.getElementById('status');
  const stepTitleEl = document.getElementById('stepTitle');
  const stepTextEl = document.getElementById('stepText');
  const stepBadgeEl = document.getElementById('stepBadge');

  const backBtn = document.getElementById('back');
  const nextBtn = document.getElementById('next');
  const replayBtn = document.getElementById('replay');
  const pauseBtn = document.getElementById('pause');
  const playBtn = document.getElementById('play');

  const speedInput = document.getElementById('speed');
  const speedVal = document.getElementById('speedVal');

  // Resize for crisp drawing
  function resize(){
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  addEventListener('resize', resize);
  resize();

  // -------- Geometry: choose a clearly obtuse triangle.
  // Base is horizontal; apex is placed so one angle is obtuse, and the perpendicular foot
  // from apex to the base lands OUTSIDE the segment AB.
  const A = {x: 170, y: 430};
  const B = {x: 640, y: 430};
  const C = {x: 90,  y: 260};   // apex left of A => obtuse + height outside

  function footPoint(P, L1, L2){
    const vx = L2.x-L1.x, vy = L2.y-L1.y;
    const wx = P.x-L1.x, wy = P.y-L1.y;
    const t = (wx*vx + wy*vy) / (vx*vx + vy*vy);
    return {x:L1.x + t*vx, y:L1.y + t*vy, t};
  }
  const H = footPoint(C, A, B); // this will be left of A (outside)
  const tri1 = [A,B,C];

  // For the second copy: rotate 180° around midpoint of AB.
  const midAB = {x:(A.x+B.x)/2, y:(A.y+B.y)/2};
  function rot180AboutMid(p){
    return {x: 2*midAB.x - p.x, y: 2*midAB.y - p.y};
  }
  const tri2Final = tri1.map(rot180AboutMid);

  // Start tri2 off to the right, then bring it in, then rotate into place.
  const tri2Start = tri2Final.map(p => ({x:p.x + 240, y:p.y - 40}));
  // Intermediate: in same orientation as final but still shifted (slide in first).
  const tri2Slide = tri2Final.map(p => ({x:p.x + 120, y:p.y}));

  // Parallelogram outline (using A -> B -> C' -> C)
  const C2 = tri2Final[2]; // opposite vertex from C
  const para = [A, B, C2, C];

  // -------- Steps
  const steps = [
    {
      title: "Step 1: Base and height",
      text: `Choose the <b>base</b> (b). Now draw the <b>height</b> (h): a line from the top corner straight down at a <b>right angle</b> to the base. <br><br>
             Because this triangle is <b>obtuse</b>, the height lands <b>outside</b> the triangle.`,
      dur: 2.4,
      draw: (u) => drawScene({u, showTri2:false, showPara:false, mode:"height"})
    },
    {
      title: "Step 2: Make a second copy (doubling)",
      text: `Make a <b>second identical triangle</b>. Now we have <b>two</b> triangles, so the total area is <b>double</b> the area of one triangle.`,
      dur: 2.0,
      draw: (u) => drawScene({u, showTri2:true, showPara:false, mode:"copy"})
    },
    {
      title: "Step 3: Rotate & fit to make a parallelogram",
      text: `Rotate and slide the second triangle so the two triangles fit together perfectly. <br><br>
             Together they make a <b>parallelogram</b> with the <b>same base (b)</b> and <b>same height (h)</b>.`,
      dur: 2.8,
      draw: (u) => drawScene({u, showTri2:true, showPara:true, mode:"form"})
    },
    {
      title: "Step 4: Use parallelogram area",
      text: `Parallelogram area = <b>b × h</b>. <br>
             That parallelogram is made of <b>two equal triangles</b>. <br><br>
             So the triangle’s area is <b>(b × h) ÷ 2</b>.`,
      dur: 2.0,
      draw: (u) => drawScene({u, showTri2:true, showPara:true, mode:"result"})
    }
  ];

  function clamp01(x){ return Math.max(0, Math.min(1, x)); }
  function ease(u){
    u = clamp01(u);
    return u < 0.5 ? 4*u*u*u : 1 - Math.pow(-2*u+2,3)/2;
  }
  function lerp(a,b,u){ return a + (b-a)*u; }
  function lerpPt(p,q,u){ return {x:lerp(p.x,q.x,u), y:lerp(p.y,q.y,u)}; }

  function cssVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function clear(w,h){
    ctx.clearRect(0,0,w,h);
    // subtle grid
    ctx.save();
    ctx.strokeStyle = cssVar('--grid');
    ctx.lineWidth = 1;
    const step = 44;
    for(let x=0; x<=w; x+=step){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
    for(let y=0; y<=h; y+=step){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
    ctx.restore();
  }

  function pathPoly(points){
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for(let i=1;i<points.length;i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.closePath();
  }

  function drawTri(points, fill, alpha=1){
    ctx.save();
    ctx.globalAlpha = alpha;
    pathPoly(points);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = cssVar('--outline');
    ctx.stroke();
    ctx.restore();
  }

  function drawLine(p,q,color,w=5,dash=null,alpha=1){
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth = w;
    ctx.lineCap = "round";
    if(dash) ctx.setLineDash(dash);
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
    ctx.restore();
  }

  function unit(p,q){
    const dx=q.x-p.x, dy=q.y-p.y;
    const d=Math.hypot(dx,dy)||1;
    return {x:dx/d,y:dy/d};
  }

  function rightAngleMark(at, along, perp, size=14, alpha=1){
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = "rgba(255,255,255,.85)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(at.x, at.y);
    ctx.lineTo(at.x + along.x*size, at.y + along.y*size);
    ctx.lineTo(at.x + along.x*size + perp.x*size, at.y + along.y*size + perp.y*size);
    ctx.lineTo(at.x + perp.x*size, at.y + perp.y*size);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function label(text, p, color="rgba(255,255,255,.95)"){
    ctx.save();
    ctx.font = "800 14px system-ui, -apple-system, Segoe UI, Roboto, Arial";
    const padX=10, padY=7;
    const w = ctx.measureText(text).width + padX*2;
    const h = 28;
    ctx.fillStyle = "rgba(0,0,0,.55)";
    ctx.strokeStyle = "rgba(255,255,255,.14)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(p.x, p.y, w, h, 12);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = color;
    ctx.fillText(text, p.x+padX, p.y+19);
    ctx.restore();
  }

  function drawScene({u, showTri2, showPara, mode}){
    const rect = canvas.getBoundingClientRect();
    const W = rect.width, Hh = rect.height;
    clear(W,Hh);

    // Triangle 1
    drawTri(tri1, cssVar('--triA'), 0.92);

    // Base
    drawLine(A,B, cssVar('--base'), 6, null, 1);
    label("base b", {x:(A.x+B.x)/2 - 28, y:A.y + 14}, cssVar('--base'));

    // Height: draw perpendicular from C to base line (even if outside the segment)
    const baseDir = unit(A,B);
    const perp = {x:-baseDir.y, y:baseDir.x};

    // Extend from C past H for visibility
    const dirCH = unit(C,H);
    const Hext = {x: H.x + dirCH.x*55, y: H.y + dirCH.y*55};

    let heightAlpha = 0.15;
    if(mode === "height") heightAlpha = ease(u);
    else heightAlpha = 0.9;

    drawLine(C, Hext, cssVar('--height'), 5, [10,8], heightAlpha);
    rightAngleMark(H, baseDir, perp, 14, heightAlpha);
    label("height h", {x: Math.min(H.x, C.x) + 10, y: Math.min(H.y, C.y) - 30}, cssVar('--height'));

    // Show that the foot is outside (little pointer text near A side)
    if(mode === "height"){
      const uu = ease(u);
      label("The height lands outside", {x: 24, y: 58}, `rgba(238,243,255,${0.95*uu})`);
    }

    // Triangle 2 motion
    if(showTri2){
      let tri2;
      let alpha = 0.9;

      if(mode === "copy"){
        // slide in from start to "near" position
        const uu = ease(u);
        tri2 = tri2Start.map((p,i) => lerpPt(p, tri2Slide[i], uu));
        alpha = 0.15 + 0.75*uu;
        label("2nd copy", {x: 24, y: 58}, cssVar('--triB'));
        label("Two triangles = double area", {x: 24, y: 92}, "rgba(238,243,255,.95)");
      } else if(mode === "form"){
        // finish the slide + "snap/rotate into place" feel (we interpolate slide->final)
        const uu = ease(u);
        tri2 = tri2Slide.map((p,i) => lerpPt(p, tri2Final[i], uu));
        alpha = 0.88;
      } else {
        tri2 = tri2Final;
        alpha = 0.88;
      }

      drawTri(tri2, cssVar('--triB'), alpha);
    }

    // Parallelogram outline
    if(showPara){
      const a = (mode === "form") ? (0.15 + 0.55*ease(u)) : 0.70;

      ctx.save();
      ctx.globalAlpha = a;
      ctx.lineWidth = 5;
      ctx.strokeStyle = "rgba(255,255,255,.55)";
      ctx.setLineDash([12,10]);
      pathPoly(para);
      ctx.stroke();
      ctx.restore();

      if(mode === "form"){
        label("Now it's a parallelogram!", {x: 24, y: 58});
      }
      if(mode === "result"){
        label("Parallelogram area = b × h", {x: 24, y: 58});
        label("Triangle area = (b × h) ÷ 2", {x: 24, y: 92});
      }
    }
  }

  // ------- Step player
  let stepIndex = 0;
  let t = 0;
  let running = true;
  let speed = 1.0;
  let last = null;

  function syncUI(){
    const s = steps[stepIndex];
    stepTitleEl.textContent = s.title;
    stepTextEl.innerHTML = s.text;
    stepBadgeEl.textContent = `${stepIndex+1} / ${steps.length}`;

    backBtn.disabled = (stepIndex === 0);
    nextBtn.disabled = (stepIndex === steps.length - 1);
  }

  function gotoStep(i){
    stepIndex = Math.max(0, Math.min(steps.length-1, i));
    t = 0;
    running = true;
    syncUI();
  }

  backBtn.addEventListener('click', () => gotoStep(stepIndex-1));
  nextBtn.addEventListener('click', () => gotoStep(stepIndex+1));
  replayBtn.addEventListener('click', () => { t = 0; running = true; });

  pauseBtn.addEventListener('click', () => running = false);
  playBtn.addEventListener('click', () => running = true);

  speedInput.addEventListener('input', () => {
    speed = parseFloat(speedInput.value);
    speedVal.textContent = speed.toFixed(1) + "×";
  });

  function frame(ts){
    if(last == null) last = ts;
    const dt = (ts - last)/1000;
    last = ts;

    const s = steps[stepIndex];
    if(running){
      t += dt * speed;
      if(t >= s.dur){
        t = s.dur;
        running = false; // pause at end of step so teacher can talk
      }
    }

    const u = (s.dur === 0) ? 1 : (t / s.dur);
    s.draw(u);

    statusEl.textContent = running ? "Playing…" : (u >= 1 ? "Step complete — click Next" : "Paused");
    requestAnimationFrame(frame);
  }

  // init
  syncUI();
  steps[0].draw(0);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
