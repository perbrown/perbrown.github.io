<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Flash Game</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 40px;
  }
  #flashBox {
    width: 200px;
    height: 200px;
    margin: 20px auto;
    border: 2px solid #000;
    background-color: white;
  }
  button {
    margin: 5px;
    padding: 10px 15px;
    font-size: 16px;
  }
  #result {
    font-size: 20px;
    margin-top: 15px;
  }
</style>
</head>
<body>

<h1>Color Flash Game</h1>

<button id="startBtn">Start</button>

<div id="flashBox"></div>

<div id="buttons"></div>

<div id="result"></div>
<div id="score"></div>
<div id="info"></div>

<script>
const colors = ["red", "orange", "yellow", "green", "blue", "indigo", "violet"];

let currentColor = "";
let flashTime = 100;
let brightness = 100;
let correct = 0;
let wrong = 0;
let gameActive = false;
let flashCount = 0;
const maxFlashes = 20;

const flashBox = document.getElementById("flashBox");
const resultDiv = document.getElementById("result");
const scoreDiv = document.getElementById("score");
const infoDiv = document.getElementById("info");
const buttonsDiv = document.getElementById("buttons");

// Create guess buttons
colors.forEach(color => {
  const btn = document.createElement("button");
  btn.innerText = color;
  btn.onclick = () => handleGuess(color);
  buttonsDiv.appendChild(btn);
});

document.getElementById("startBtn").onclick = startGame;

function startGame() {
  correct = 0;
  wrong = 0;
  flashTime = 100;
  brightness = 100;
  flashCount = 0;
  gameActive = true;

  resultDiv.innerText = "";
  scoreDiv.innerText = "";
  infoDiv.innerText = "";

  resetBox();
  nextRound();
}

function resetBox() {
  flashBox.style.backgroundColor = "white";
  flashBox.style.filter = "brightness(100%)";
}

function nextRound() {
  if (flashCount >= maxFlashes) {
    endGame();
    return;
  }

  flashCount++;

  currentColor = colors[Math.floor(Math.random() * colors.length)];

  flashBox.style.filter = `brightness(${brightness}%)`;
  flashBox.style.backgroundColor = currentColor;

  infoDiv.innerText = `Flash: ${flashTime} ms | Brightness: ${brightness}% | Round: ${flashCount}/${maxFlashes}`;

  setTimeout(() => {
    resetBox();
  }, flashTime);
}

function handleGuess(guess) {
  if (!gameActive) return;

  if (guess === currentColor) {
    resultDiv.innerText = "Correct!";
    correct++;
  } else {
    resultDiv.innerText = `Wrong! It was ${currentColor}`;
    wrong++;
  }

  scoreDiv.innerText = `Correct: ${correct} | Wrong: ${wrong}`;

  gameActive = false;

  setTimeout(() => {
    // Stop decreasing at 50 ms
    if (flashTime > 50) {
      flashTime -= 5;
    }

    // Stop brightness at 40%
    if (brightness > 40) {
      brightness -= 5;
    }

    resultDiv.innerText = "";
    gameActive = true;
    nextRound();
  }, 2000);
}

function endGame() {
  gameActive = false;
  resetBox();
  resultDiv.innerText = "Game Over!";
  scoreDiv.innerText = `Final Score → Correct: ${correct}, Wrong: ${wrong}`;
  infoDiv.innerText = "";
}
</script>

</body>
</html>
