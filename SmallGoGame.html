<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Go Game</title>
    <style>
        #perimeterPanel {
            display: none;
            margin-top: 10px;
            
        }
        .outline {
            stroke: red;
            stroke-width: 4;
        }
        .tick {
            fill: red;
        }
    </style>
</head>
<body>
    <canvas id="goCanvas"></canvas>
    <div id="perimeterPanel">
        <label for="perimeterInput">Perimeter (grid-edges):</label>
        <input type="number" id="perimeterInput">
        <button id="submitButton">Submit</button>
        <button id="skipButton">Skip</button>
    </div>
    <script>
        let lastEnclosure = null;
        let pendingQuestion = null;
        
        function drawCaptureOutline(enclosure) {
            // Drawing logic here...
            if (enclosure) {
                // Example logic for drawing outline and ticks
                ctx.beginPath();
                ctx.lineWidth = 4;
                ctx.strokeStyle = 'red';
                ctx.moveTo(...); // move to start of the enclosure
                // Draw outline ...
                for (let edge of enclosure.edges) {
                    // Draw edge 
                    ctx.lineTo(...);
                    // Draw tick marks
                    ctx.fillStyle = 'red';
                    ctx.beginPath();
                    ctx.arc(..., 3, 0, 2 * Math.PI);
                    ctx.fill();
                }
                ctx.closePath();
                ctx.stroke();
            }
        }

        function onEnclosureDetected(enclosure) {
            lastEnclosure = enclosure;
            pendingQuestion = { enclosure, askedPlayer: true };
            document.getElementById('perimeterPanel').style.display = 'block';
            // Disable further stone placements
        }

        document.getElementById('submitButton').addEventListener('click', function() {
            const inputPerimeter = parseInt(document.getElementById('perimeterInput').value);
            if (inputPerimeter === lastEnclosure.perimeter) {
                // Award points logic
                alert('Correct! You have been awarded ' + lastEnclosure.region.length + ' points.');
            } else {
                alert('Incorrect answer.');
            }
            document.getElementById('perimeterPanel').style.display = 'none';
            // Logic to allow stone placements again
        });

        document.getElementById('skipButton').addEventListener('click', function() {
            document.getElementById('perimeterPanel').style.display = 'none';
            // Logic to allow stone placements again
        });
    </script>
</body>
</html>
